<div class="admin-container bg-slate-50 dark:bg-slate-950 transition-colors duration-500">

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full overflow-hidden">

        <!-- Header -->
        <header
            class="h-20 px-4 sm:px-6 flex items-center justify-between z-40 bg-white/50 dark:bg-slate-950/50 backdrop-blur-md border-b border-black/5 dark:border-white/5">
            <div class="flex items-center gap-4">
                <h1
                    class="text-xl sm:text-2xl font-black bg-gradient-to-r from-lime-400 to-emerald-500 bg-clip-text text-transparent">
                    QUIRQUINCHO
                </h1>
                <div
                    class="hidden sm:flex items-center gap-2 px-3 py-1 bg-white/10 rounded-full border border-white/10">
                    <div class="w-2 h-2 rounded-full bg-lime-400 animate-pulse shadow-[0_0_8px_#adff2f]"></div>
                    <span class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">
                        Live: {{ visitas() || 0 }}
                    </span>
                </div>
            </div>

            <div class="flex items-center gap-3 sm:gap-4">
                <!-- Theme Toggle -->
                <button (click)="toggleDarkMode()" class="theme-toggle" title="Cambiar Tema">
                    <mat-icon class="transition-all duration-500"
                        [ngClass]="darkMode() ? 'text-yellow-400 rotate-[360deg]' : 'text-slate-900 rotate-0'">
                        {{ darkMode() ? 'light_mode' : 'dark_mode' }}
                    </mat-icon>
                </button>

                <!-- User Menu -->
                <button type="button" [matMenuTriggerFor]="userMenu"
                    class="flex items-center gap-2 p-1.5 rounded-full hover:bg-slate-200 dark:hover:bg-white/10 transition-colors border border-black/5 dark:border-white/10">
                    <img class="w-8 h-8 rounded-full shadow-md object-cover" [src]="foto()"
                        [alt]="usuario()?.displayName">
                    <mat-icon class="text-slate-500 dark:text-slate-400 hidden sm:block">expand_more</mat-icon>
                </button>
            </div>
        </header>

        <!-- Dynamic Content -->
        <main class="main-content flex-1 p-4 pb-36">
            <div class="animate-fade-in h-full">
                <router-outlet></router-outlet>
            </div>
        </main>
    </div>

    <!-- Mobile/Global Navigation (Bottom Bar) -->
    <!-- Elegante, moderno y siempre visible para fácil acceso -->
    <nav
        class="fixed bottom-4 left-4 right-4 h-[72px] bg-white/95 dark:bg-slate-900/90 backdrop-blur-xl flex justify-around items-center z-[100] border border-black/5 dark:border-white/10 rounded-3xl px-3 shadow-[0_10px_30px_rgba(0,0,0,0.1)] dark:shadow-[0_20px_40px_rgba(0,0,0,0.4)] transition-colors duration-500">
        @for (item of menuItems.slice(0, 4); track item.link) {
        <a [routerLink]="item.link" routerLinkActive="active"
            class="flex flex-col items-center text-[11px] font-medium text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-all duration-300 gap-1 mt-1">
            <mat-icon class="text-[26px] w-[26px] h-[26px]" [ngClass]="item.color">{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
        </a>
        }
        <button type="button" [matMenuTriggerFor]="mobileMoreMenu"
            class="flex flex-col items-center text-[11px] font-medium text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-all duration-300 gap-1 mt-1">
            <mat-icon class="text-slate-400 text-[26px] w-[26px] h-[26px]">more_horiz</mat-icon>
            <span>Más</span>
        </button>
    </nav>

    <!-- Menus -->
    <mat-menu #userMenu="matMenu" class="glass-menu min-w-[220px]">
        <div class="px-4 py-3 border-b border-black/5 dark:border-white/10 flex flex-col gap-1">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Sesión iniciada</p>
            <p class="text-sm font-medium pr-4">{{ usuario()?.email }}</p>
        </div>

        <button mat-menu-item (click)="toggleDarkMode()">
            <mat-icon [ngClass]="darkMode() ? 'text-amber-400' : 'text-slate-500'">{{ darkMode() ? 'light_mode' :
                'dark_mode' }}</mat-icon>
            <span>Cambiar a Tema {{ darkMode() ? 'Claro' : 'Oscuro' }}</span>
        </button>

        <button mat-menu-item [matMenuTriggerFor]="paletteMenu">
            <mat-icon class="text-indigo-400">palette</mat-icon>
            <span>Paleta de Colores</span>
        </button>

        <mat-divider></mat-divider>

        <!--         <button mat-menu-item [routerLink]="'ajustes'">
            <mat-icon>settings</mat-icon>
            <span>Ajustes</span>
        </button> -->
        <button mat-menu-item (click)="recargarPagina()">
            <mat-icon>refresh</mat-icon>
            <span>Recargar</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="salir()">
            <mat-icon class="text-rose-500">logout</mat-icon>
            <span class="text-rose-500 font-bold">Cerrar Sesión</span>
        </button>
    </mat-menu>

    <!-- Menu Paleta -->
    <mat-menu #paletteMenu="matMenu" class="glass-menu">
        <button mat-menu-item (click)="cambiarPaleta('theme-chartreuse')">
            <mat-icon class="text-lime-500">circle</mat-icon> Lime (Por Defecto)
        </button>
        <button mat-menu-item (click)="cambiarPaleta('theme-cyan')">
            <mat-icon class="text-cyan-500">circle</mat-icon> Cyan Radiante
        </button>
        <button mat-menu-item (click)="cambiarPaleta('theme-rose')">
            <mat-icon class="text-rose-500">circle</mat-icon> Rose Carmesí
        </button>
        <button mat-menu-item (click)="cambiarPaleta('theme-orange')">
            <mat-icon class="text-amber-500">circle</mat-icon> Orange Solar
        </button>
    </mat-menu>

    <!-- Menu Más (Todos los Accesos + Opciones de Usuario) -->
    <mat-menu #mobileMoreMenu="matMenu" class="glass-menu">
        <!-- Navegación Todos los Accesos -->
        @for (item of menuItemsTodos; track item.link) {
        <button mat-menu-item [routerLink]="item.link">
            <mat-icon [class]="item.color">{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
        </button>
        }

        <!--         <mat-divider></mat-divider> -->

        <!-- Opciones de Usuario -->
        <!--         <button mat-menu-item [routerLink]="'ajustes'">
            <mat-icon>settings</mat-icon>
            <span>Ajustes</span>
        </button>
        <button mat-menu-item (click)="recargarPagina()">
            <mat-icon>refresh</mat-icon>
            <span>Recargar</span>
        </button> -->
        <!--         <button mat-menu-item [matMenuTriggerFor]="paletteMenu">
            <mat-icon class="text-indigo-400">palette</mat-icon>
            <span>Paleta de Colores</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="salir()">
            <mat-icon class="text-rose-500">logout</mat-icon>
            <span class="text-rose-500 font-bold">Cerrar Sesión</span>
        </button> -->
    </mat-menu>

</div>
